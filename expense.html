<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>เพิ่มรายจ่าย</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="header">
  <div>
    <h1>💸 เพิ่มรายจ่าย</h1>
    <p>บันทึกรายจ่ายร้านข้าวต้มแห้งคุณนิด</p>
  </div>
</header>

<section class="dashboard">
  <div class="card">
    <h2>วันที่</h2>
<input id="date" type="date">
    <h2>หมวดรายจ่าย</h2>
    <select id="category">
      <option>Makro</option>
      <option>Betagro</option>
      <option>Freshket</option>
      <option>เฮงเฮงฟู้ด</option>
      <option>ผักสด</option>
      <option>น้ำแข็ง</option>
      <option>ค่าแรง</option>
      <option>ค่าเช่า</option>
      <option>ค่าแก๊ส</option>
      <option>ของใช้เบ็ดเตล็ด</option>
      <option>อื่น ๆ</option>
    </select>

    <h2>จำนวนเงิน</h2>
    <input id="amount" type="number" placeholder="เช่น 2450">

    <h2>หมายเหตุ</h2>
    <input id="note" type="text" placeholder="เช่น ซื้อของเข้าร้าน">

    <button onclick="saveExpense()">บันทึกรายจ่าย</button>
    <button onclick="location.href='index.html'">กลับหน้าแรก</button>
  </div>
</section>

<script src="js/storage.js"></script>
<script>
function saveExpense() {
  const amount = document.getElementById("amount").value;
  const category = document.getElementById("category").value;
  const note = document.getElementById("note").value;

  if (!amount) {
    alert("กรุณากรอกจำนวนเงิน");
    return;
  }

  addTransaction("expense", amount, category, note);
  alert("บันทึกรายจ่ายเรียบร้อย");
  location.href = "index.html";
}
</script>

</body>
</html>
