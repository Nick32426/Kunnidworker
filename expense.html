<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>เพิ่มรายจ่าย</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
</head>
<body>

<header class="header">
  <h1>💸 เพิ่มรายจ่ายจากสลิป</h1>
  <p>อัปโหลดสลิป แล้วระบบจะอ่านข้อมูลให้อัตโนมัติ</p>
</header>

<section class="form-box">
  <label>อัปโหลดสลิป / ใบเสร็จ</label>
  <input id="slip" type="file" accept="image/*" onchange="readSlipAndFill()">

  <p id="ocrStatus" style="font-weight:bold;color:#8b2f14;"></p>

  <div id="resultBox" style="display:none;">
    <h2>รายการที่อ่านได้</h2>

    <label>วันที่</label>
    <input id="date" type="date">

    <label>หมวดรายจ่าย</label>
    <select id="category">
      <option>วัตถุดิบ</option>
      <option>ค่าแรง</option>
      <option>ค่าเช่า</option>
      <option>ค่าน้ำ</option>
      <option>ค่าไฟ</option>
      <option>ค่าแก๊ส</option>
      <option>ค่าเดินทาง</option>
      <option>อื่น ๆ</option>
    </select>

    <label>จำนวนเงิน</label>
    <input id="amount" type="number">

    <label>หมายเหตุ</label>
    <input id="note" type="text">

    <button onclick="saveExpense()">ยืนยันบันทึกรายจ่าย</button>
  </div>

  <button class="secondary" onclick="location.href='index.html'">กลับหน้าแรก</button>
</section>

<script src="js/storage.js"></script>

<script>
let slipImageBase64 = "";

async function readSlipAndFill() {
  const file = document.getElementById("slip").files[0];
  const status = document.getElementById("ocrStatus");
  const resultBox = document.getElementById("resultBox");

  if (!file) return;

  status.textContent = "กำลังอ่านข้อมูลจากสลิป...";
  resultBox.style.display = "none";

  const reader = new FileReader();

  reader.onload = async function(e) {
    slipImageBase64 = e.target.result;

    try {
      const result = await Tesseract.recognize(file, "tha+eng");
      const text = result.data.text;

      console.log(text);

      const amount = detectAmount(text);
      const date = detectDate(text) || todayDate();
      const category = detectCategory(text);
      const shopName = detectShopName(text);

      document.getElementById("date").value = date;
      document.getElementById("amount").value = amount || "";
      document.getElementById("category").value = category;
      document.getElementById("note").value = shopName ? "สลิปจาก " + shopName : "อ่านจากสลิปอัตโนมัติ";

      resultBox.style.display = "block";

      if (amount) {
        status.textContent = "อ่านสลิปสำเร็จ ตรวจสอบแล้วกดยืนยันบันทึก";
      } else {
        status.textContent = "อ่านสลิปได้บางส่วน กรุณาตรวจยอดเงินก่อนบันทึก";
      }

    } catch (error) {
      console.error(error);
      status.textContent = "อ่านสลิปไม่สำเร็จ กรุณาลองเลือกรูปใหม่";
    }
  };

  reader.readAsDataURL(file);
}

function detectAmount(text) {
  const matches = text.match(/\d{1,3}(,\d{3})*(\.\d{2})|\d+(\.\d{2})/g);
  if (!matches) return "";

  const numbers = matches
    .map(x => Number(x.replace(/,/g, "")))
    .filter(x => x > 0 && x < 1000000);

  if (numbers.length === 0) return "";

  return Math.max(...numbers);
}

function detectDate(text) {
  const match = text.match(/(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{2,4})/);
  if (!match) return "";

  let day = match[1].padStart(2, "0");
  let month = match[2].padStart(2, "0");
  let year = match[3];

  if (year.length === 2) year = "20" + year;
  if (Number(year) > 2400) year = String(Number(year) - 543);

  return `${year}-${month}-${day}`;
}

function detectCategory(text) {
  const lower = text.toLowerCase();

  if (
    text.includes("หมู") ||
    text.includes("ไก่") ||
    text.includes("ข้าว") ||
    text.includes("ไข่") ||
    text.includes("ผัก") ||
    text.includes("ตลาด") ||
    lower.includes("makro") ||
    lower.includes("lotus") ||
    lower.includes("big c")
  ) {
    return "วัตถุดิบ";
  }

  if (text.includes("ไฟฟ้า") || lower.includes("pea") || lower.includes("mea")) {
    return "ค่าไฟ";
  }

  if (text.includes("ประปา") || lower.includes("water")) {
    return "ค่าน้ำ";
  }

  if (text.includes("แก๊ส") || lower.includes("gas")) {
    return "ค่าแก๊ส";
  }

  if (text.includes("เช่า")) {
    return "ค่าเช่า";
  }

  if (text.includes("เงินเดือน") || text.includes("ค่าจ้าง")) {
    return "ค่าแรง";
  }

  if (lower.includes("ptt") || lower.includes("bangchak") || text.includes("น้ำมัน")) {
    return "ค่าเดินทาง";
  }

  return "อื่น ๆ";
}

function detectShopName(text) {
  const lines = text.split("\n").map(x => x.trim()).filter(Boolean);
  return lines.length > 0 ? lines[0] : "";
}

function saveExpense() {
  const date = document.getElementById("date").value;
  const category = document.getElementById("category").value;
  const amount = document.getElementById("amount").value;
  const note = document.getElementById("note").value;

  if (!amount) {
    alert("ไม่พบยอดเงิน กรุณาตรวจสอบก่อนบันทึก");
    return;
  }

  addTransaction({
    type: "expense",
    date,
    category,
    amount: Number(amount),
    note,
    slip: slipImageBase64
  });

  alert("บันทึกรายจ่ายเรียบร้อย");
  location.href = "index.html";
}
</script>

</body>
</html>
