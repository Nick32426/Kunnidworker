<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>เพิ่มรายจ่าย</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="header">
  <h1>💸 เพิ่มรายจ่าย</h1>
</header>

<section class="form-box">
  <label>วันที่</label>
  <input id="date" type="date">

  <label>หมวดรายจ่าย</label>
  <select id="category">
    <option>วัตถุดิบ</option>
    <option>ค่าแรง</option>
    <option>ค่าเช่า</option>
    <option>ค่าน้ำ</option>
    <option>ค่าไฟ</option>
    <option>ค่าแก๊ส</option>
    <option>ค่าเดินทาง</option>
    <option>อื่น ๆ</option>
  </select>

  <label>จำนวนเงิน</label>
  <input id="amount" type="number" placeholder="เช่น 1200">

  <label>หมายเหตุ</label>
  <input id="note" type="text" placeholder="เช่น ซื้อหมู ซื้อข้าว">

  <label>อัปโหลดสลิป / ใบเสร็จ</label>
  <input id="slip" type="file" accept="image/*">

  <button onclick="saveExpense()">บันทึกรายจ่าย</button>
  <button class="secondary" onclick="location.href='index.html'">กลับหน้าแรก</button>
</section>

<script src="js/storage.js"></script>
<script>
document.getElementById("date").value = todayDate();

function saveExpense() {
  const date = document.getElementById("date").value;
  const category = document.getElementById("category").value;
  const amount = document.getElementById("amount").value;
  const note = document.getElementById("note").value;
  const slipFile = document.getElementById("slip").files[0];

  if (!date || !amount) {
    alert("กรุณากรอกวันที่และจำนวนเงิน");
    return;
  }

  if (slipFile) {
    const reader = new FileReader();

    reader.onload = function(e) {
      addTransaction({
        type: "expense",
        date,
        category,
        amount: Number(amount),
        note,
        slip: e.target.result
      });

      alert("บันทึกรายจ่ายเรียบร้อย");
      location.href = "index.html";
    };

    reader.readAsDataURL(slipFile);
  } else {
    addTransaction({
      type: "expense",
      date,
      category,
      amount: Number(amount),
      note,
      slip: ""
    });

    alert("บันทึกรายจ่ายเรียบร้อย");
    location.href = "index.html";
  }
}
</script>

</body>
</html>
