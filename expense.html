<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>เพิ่มรายจ่ายจากสลิป</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
</head>
<body>

<header class="header">
  <h1>📸 เพิ่มรายจ่ายจากสลิป</h1>
  <p>อัปโหลดสลิป ระบบจะอ่านยอดเงิน วันที่ และหมวดให้อัตโนมัติ</p>
</header>

<section class="form-box">
  <label>อัปโหลดสลิป / ใบเสร็จ</label>
  <input id="slip" type="file" accept="image/*">

  <p id="status" class="status"></p>

  <div id="resultBox" style="display:none;">
    <label>วันที่</label>
    <input id="date" type="date">

    <label>หมวดรายจ่าย</label>
    <select id="category">
      <option>วัตถุดิบ</option>
      <option>ค่าแรง</option>
      <option>ค่าเช่า</option>
      <option>ค่าน้ำ</option>
      <option>ค่าไฟ</option>
      <option>ค่าแก๊ส</option>
      <option>ค่าเดินทาง</option>
      <option>อื่น ๆ</option>
    </select>

    <label>จำนวนเงิน</label>
    <input id="amount" type="number">

    <label>หมายเหตุ</label>
    <input id="note" type="text">

    <button id="saveBtn">ยืนยันบันทึกรายจ่าย</button>
  </div>

  <button class="secondary" onclick="location.href='index.html'">กลับหน้าแรก</button>
</section>

<script type="module">
import { addTransaction, todayDate } from "./js/firebase.js";

let slipBase64 = "";

document.getElementById("slip").addEventListener("change", readSlip);

async function readSlip() {
  const file = document.getElementById("slip").files[0];
  if (!file) return;

  document.getElementById("status").textContent = "กำลังอ่านสลิป...";
  document.getElementById("resultBox").style.display = "none";

  slipBase64 = await resizeImage(file);

  try {
    const result = await Tesseract.recognize(file, "tha+eng");
    const text = result.data.text;

    console.log(text);

    const amount = detectAmount(text);
    const date = detectDate(text) || todayDate();
    const category = detectCategory(text);
    const shop = detectShop(text);

    document.getElementById("date").value = date;
    document.getElementById("amount").value = amount;
    document.getElementById("category").value = category;
    document.getElementById("note").value = shop ? "สลิปจาก " + shop : "อ่านจากสลิปอัตโนมัติ";

    document.getElementById("resultBox").style.display = "block";
    document.getElementById("status").textContent = "อ่านสลิปเสร็จแล้ว ตรวจสอบแล้วกดบันทึก";
  } catch (e) {
    console.error(e);
    document.getElementById("status").textContent = "อ่านสลิปไม่สำเร็จ กรุณาลองรูปใหม่";
  }
}

document.getElementById("saveBtn").onclick = async () => {
  const date = document.getElementById("date").value;
  const category = document.getElementById("category").value;
  const amount = document.getElementById("amount").value;
  const note = document.getElementById("note").value;

  if (!amount) {
    alert("ไม่พบยอดเงิน กรุณาตรวจสอบก่อนบันทึก");
    return;
  }

  await addTransaction({
    type: "expense",
    date,
    category,
    amount: Number(amount),
    note,
    slip: slipBase64,
    createdAt: new Date().toISOString()
  });

  alert("บันทึกรายจ่ายเรียบร้อย");
  location.href = "index.html";
};

function detectAmount(text) {
  const matches = text.match(/\d{1,3}(,\d{3})*(\.\d{2})|\d+(\.\d{2})/g);
  if (!matches) return "";

  const nums = matches
    .map(x => Number(x.replace(/,/g, "")))
    .filter(x => x > 0 && x < 1000000);

  return nums.length ? Math.max(...nums) : "";
}

function detectDate(text) {
  const match = text.match(/(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{2,4})/);
  if (!match) return "";

  let d = match[1].padStart(2, "0");
  let m = match[2].padStart(2, "0");
  let y = match[3];

  if (y.length === 2) y = "20" + y;
  if (Number(y) > 2400) y = String(Number(y) - 543);

  return `${y}-${m}-${d}`;
}

function detectCategory(text) {
  const lower = text.toLowerCase();

  if (
    text.includes("หมู") || text.includes("ไก่") || text.includes("ข้าว") ||
    text.includes("ไข่") || text.includes("ผัก") || text.includes("ตลาด") ||
    lower.includes("makro") || lower.includes("lotus") || lower.includes("big c")
  ) return "วัตถุดิบ";

  if (text.includes("ไฟฟ้า") || lower.includes("pea") || lower.includes("mea")) return "ค่าไฟ";
  if (text.includes("ประปา") || lower.includes("water")) return "ค่าน้ำ";
  if (text.includes("แก๊ส") || lower.includes("gas")) return "ค่าแก๊ส";
  if (text.includes("เช่า")) return "ค่าเช่า";
  if (text.includes("เงินเดือน") || text.includes("ค่าจ้าง")) return "ค่าแรง";
  if (lower.includes("ptt") || lower.includes("bangchak") || text.includes("น้ำมัน")) return "ค่าเดินทาง";

  return "อื่น ๆ";
}

function detectShop(text) {
  const lines = text.split("\n").map(x => x.trim()).filter(Boolean);
  return lines[0] || "";
}

function resizeImage(file) {
  return new Promise(resolve => {
    const reader = new FileReader();

    reader.onload = e => {
      const img = new Image();

      img.onload = () => {
        const canvas = document.createElement("canvas");
        const maxWidth = 800;
        const scale = Math.min(maxWidth / img.width, 1);

        canvas.width = img.width * scale;
        canvas.height = img.height * scale;

        const ctx = canvas.getContext("2d");
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

        resolve(canvas.toDataURL("image/jpeg", 0.6));
      };

      img.src = e.target.result;
    };

    reader.readAsDataURL(file);
  });
}
</script>

</body>
</html>
