<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>รายงาน</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="header">
  <h1>📊 รายงานรายรับรายจ่าย</h1>
</header>

<section class="form-box">
  <label>เลือกวันที่</label>
  <input id="filterDate" type="date" onchange="renderReport()">

  <label>เลือกเดือน</label>
  <input id="filterMonth" type="month" onchange="renderReport()">

  <div class="summary">
    <p>รายรับ: <b id="sumIncome">฿ 0</b></p>
    <p>รายจ่าย: <b id="sumExpense">฿ 0</b></p>
    <p>กำไร / ขาดทุน: <b id="sumProfit">฿ 0</b></p>
  </div>

  <button class="secondary" onclick="location.href='index.html'">กลับหน้าแรก</button>
</section>

<section class="table-box">
  <table>
    <thead>
      <tr>
        <th>วันที่</th>
        <th>ประเภท</th>
        <th>หมวด</th>
        <th>จำนวน</th>
        <th>หมายเหตุ</th>
        <th>สลิป</th>
        <th>ลบ</th>
      </tr>
    </thead>
    <tbody id="reportBody"></tbody>
  </table>
</section>

<script src="js/storage.js"></script>
<script>
document.getElementById("filterDate").value = todayDate();
document.getElementById("filterMonth").value = getMonth(todayDate());

function renderReport() {
  const data = getTransactions();
  const filterDate = document.getElementById("filterDate").value;
  const filterMonth = document.getElementById("filterMonth").value;
  const body = document.getElementById("reportBody");

  body.innerHTML = "";

  let income = 0;
  let expense = 0;

  const filtered = data.filter(item => {
    if (filterDate) return item.date === filterDate;
    if (filterMonth) return getMonth(item.date) === filterMonth;
    return true;
  });

  filtered.forEach(item => {
    if (item.type === "income") income += Number(item.amount);
    if (item.type === "expense") expense += Number(item.amount);

    const tr = document.createElement("tr");

    tr.innerHTML = `
      <td>${item.date}</td>
      <td>${item.type === "income" ? "รายรับ" : "รายจ่าย"}</td>
      <td>${item.category}</td>
      <td>${formatMoney(item.amount)}</td>
      <td>${item.note || "-"}</td>
      <td>
        ${item.slip ? `<a href="${item.slip}" target="_blank">ดูสลิป</a>` : "-"}
      </td>
      <td>
        <button class="danger" onclick="removeItem(${item.id})">ลบ</button>
      </td>
    `;

    body.appendChild(tr);
  });

  const profit = income - expense;

  document.getElementById("sumIncome").textContent = formatMoney(income);
  document.getElementById("sumExpense").textContent = formatMoney(expense);
  document.getElementById("sumProfit").textContent = formatMoney(profit);
}

function removeItem(id) {
  if (confirm("ต้องการลบรายการนี้ใช่ไหม?")) {
    deleteTransaction(id);
    renderReport();
  }
}

renderReport();
</script>

</body>
</html>
