<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>รายงาน</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="header">
  <h1>📊 รายงาน</h1>
</header>

<section class="form-box">
  <label>เลือกวันที่</label>
  <input id="filterDate" type="date">

  <label>เลือกเดือน</label>
  <input id="filterMonth" type="month">

  <button id="dailyBtn">ดูรายวัน</button>
  <button id="monthlyBtn">ดูรายเดือน</button>

  <div class="summary">
    <p>รายรับ: <b id="sumIncome">฿ 0</b></p>
    <p>รายจ่าย: <b id="sumExpense">฿ 0</b></p>
    <p>กำไร/ขาดทุน: <b id="sumProfit">฿ 0</b></p>
  </div>

  <button class="secondary" onclick="location.href='index.html'">กลับหน้าแรก</button>
</section>

<section class="table-box">
  <table>
    <thead>
      <tr>
        <th>วันที่</th>
        <th>ประเภท</th>
        <th>หมวด</th>
        <th>ยอดเงิน</th>
        <th>หมายเหตุ</th>
        <th>สลิป</th>
        <th>ลบ</th>
      </tr>
    </thead>
    <tbody id="body"></tbody>
  </table>
</section>

<script type="module">
import {
  getTransactions,
  deleteTransaction,
  todayDate,
  monthNow,
  money
} from "./js/firebase.js";

let mode = "day";

document.getElementById("filterDate").value = todayDate();
document.getElementById("filterMonth").value = monthNow();

document.getElementById("dailyBtn").onclick = () => {
  mode = "day";
  render();
};

document.getElementById("monthlyBtn").onclick = () => {
  mode = "month";
  render();
};

async function render() {
  const data = await getTransactions();
  const tbody = document.getElementById("body");
  tbody.innerHTML = "";

  const fd = document.getElementById("filterDate").value;
  const fm = document.getElementById("filterMonth").value;

  let income = 0;
  let expense = 0;

  const filtered = data.filter(item => {
    if (mode === "day") return item.date === fd;
    return item.date && item.date.slice(0, 7) === fm;
  });

  filtered.forEach(item => {
    if (item.type === "income") income += Number(item.amount);
    if (item.type === "expense") expense += Number(item.amount);

    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td>${item.date}</td>
      <td>${item.type === "income" ? "รายรับ" : "รายจ่าย"}</td>
      <td>${item.category || "-"}</td>
      <td>${money(item.amount)}</td>
      <td>${item.note || "-"}</td>
      <td>${item.slip ? `<a href="${item.slip}" target="_blank">ดูสลิป</a>` : "-"}</td>
      <td><button class="danger" data-id="${item.id}">ลบ</button></td>
    `;
    tbody.appendChild(tr);
  });

  document.getElementById("sumIncome").textContent = money(income);
  document.getElementById("sumExpense").textContent = money(expense);
  document.getElementById("sumProfit").textContent = money(income - expense);

  document.querySelectorAll(".danger").forEach(btn => {
    btn.onclick = async () => {
      if (confirm("ต้องการลบรายการนี้ใช่ไหม?")) {
        await deleteTransaction(btn.dataset.id);
        render();
      }
    };
  });
}

render();
</script>

</body>
</html>
