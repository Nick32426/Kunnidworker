<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ข้าวต้มแห้งคุณนิด</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="header">
  <h1>🍜 ข้าวต้มแห้งคุณนิด</h1>
  <p>รายรับ รายจ่าย กำไร ขาดทุน</p>
</header>

<section class="dashboard">
  <div class="card income">
    <h2>รายรับวันนี้</h2>
    <h1 id="income">฿ 0</h1>
  </div>
  <div class="card expense">
    <h2>รายจ่ายวันนี้</h2>
    <h1 id="expense">฿ 0</h1>
  </div>
  <div class="card profit">
    <h2>กำไร/ขาดทุนวันนี้</h2>
    <h1 id="profit">฿ 0</h1>
  </div>
</section>

<section class="menu">
  <button onclick="location.href='income.html'">➕ เพิ่มรายรับ</button>
  <button onclick="location.href='expense.html'">📸 เพิ่มรายจ่ายจากสลิป</button>
  <button onclick="location.href='report.html'">📊 รายงาน</button>
</section>

<script type="module">
import { getTransactions, todayDate, money } from "./js/firebase.js";

async function load() {
  const data = await getTransactions();
  const today = todayDate();

  let income = 0;
  let expense = 0;

  data.forEach(item => {
    if (item.date === today) {
      if (item.type === "income") income += Number(item.amount);
      if (item.type === "expense") expense += Number(item.amount);
    }
  });

  document.getElementById("income").textContent = money(income);
  document.getElementById("expense").textContent = money(expense);
  document.getElementById("profit").textContent = money(income - expense);
}

load();
</script>

</body>
</html>
