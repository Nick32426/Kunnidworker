<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>เพิ่มรายรับ</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="header">
  <h1>💰 เพิ่มรายรับ</h1>
</header>

<section class="form-box">
  <label>วันที่</label>
  <input id="date" type="date">

  <label>ช่องทางรับเงิน</label>
  <select id="category">
    <option>เงินสด</option>
    <option>เงินโอน</option>
    <option>PromptPay</option>
    <option>Grab</option>
    <option>LINE MAN</option>
    <option>อื่น ๆ</option>
  </select>

  <label>จำนวนเงิน</label>
  <input id="amount" type="number" placeholder="เช่น 8500">

  <label>หมายเหตุ</label>
  <input id="note" type="text" placeholder="เช่น ยอดขายหน้าร้าน">

  <button id="saveBtn">บันทึกรายรับ</button>
  <button class="secondary" onclick="location.href='index.html'">กลับหน้าแรก</button>
</section>

<script type="module">
import { addTransaction, todayDate } from "./js/firebase.js";

document.getElementById("date").value = todayDate();

document.getElementById("saveBtn").onclick = async () => {
  const date = document.getElementById("date").value;
  const category = document.getElementById("category").value;
  const amount = document.getElementById("amount").value;
  const note = document.getElementById("note").value;

  if (!date || !amount) {
    alert("กรุณากรอกวันที่และจำนวนเงิน");
    return;
  }

  await addTransaction({
    type: "income",
    date,
    category,
    amount: Number(amount),
    note,
    slip: "",
    createdAt: new Date().toISOString()
  });

  alert("บันทึกรายรับเรียบร้อย");
  location.href = "index.html";
};
</script>

</body>
</html>
